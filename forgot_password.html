<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-100 font-['Inter'] min-h-screen flex items-center justify-center">
    <div class="container mx-auto px-4 py-8 max-w-md">
        <div class="bg-white shadow-lg rounded-lg p-8">
            <h2 class="text-3xl font-bold text-blue-600 text-center mb-6">Forgot Password</h2>
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <p class="text-red-600 text-center mb-4">{{ messages[0] }}</p>
                {% endif %}
            {% endwith %}
            <form method="POST" action="{{ url_for('forgot_password') }}" class="space-y-4">
                <div>
                    <label for="card_number" class="block text-sm font-medium text-gray-700">Card Number</label>
                    <input type="text" id="card_number" name="card_number" required class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 transition transform hover:scale-105">Send Password</button>
            </form>
            <p class="text-center text-gray-600 mt-4">Remembered your password? <a href="{{ url_for('login') }}" class="text-blue-600 hover:underline">Login</a></p>
        </div>
    </div>
</body>
</html>
